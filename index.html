<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thư Chúc 8/3 - 11A5</title>

<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
font-family:'Quicksand',sans-serif;

background: linear-gradient(270deg,#ffc0cb,#ffffff,#ffb6c1);
background-size:600% 600%;
animation:bgmove 12s ease infinite;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

@keyframes bgmove{
0%{background-position:0% 50%}
50%{background-position:100% 50%}
100%{background-position:0% 50%}
}

/* hoa rơi */

.flower{
position:fixed;
top:-20px;
font-size:22px;
animation:fall linear infinite;
pointer-events:none;
}

@keyframes fall{
0%{transform:translateY(-10px) rotate(0deg);}
100%{transform:translateY(110vh) rotate(360deg);}
}

/* màn hình thư */

#startScreen{
text-align:center;
cursor:pointer;
}

.envelope{
font-size:90px;
}

.flowers{
font-size:30px;
margin-top:-10px;
}

.openText{
margin-top:10px;
font-size:18px;
color:#d63384;
}

/* lời chúc */

#wishBox{

position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);

width:80%;
text-align:center;

font-size:28px;
color:#c2185b;

font-family:'Dancing Script',cursive;

opacity:0;
transition:opacity 1.5s;
}

</style>
</head>

<body>

<div id="startScreen">

<div class="envelope">💌</div>

<div class="flowers">🌸 🌷 🌸</div>

<div class="openText">Click to open</div>

</div>


<div id="wishBox"></div>


<script>

/* hoa rơi */

function createFlower(){

const f=document.createElement("div");

f.className="flower";
f.innerHTML="🌸";

f.style.left=Math.random()*100+"vw";
f.style.fontSize=(16+Math.random()*20)+"px";
f.style.animationDuration=(6+Math.random()*6)+"s";

document.body.appendChild(f);

setTimeout(()=>f.remove(),12000);

}

setInterval(createFlower,350);


/* nội dung lời chúc */

const wishes=[

"🌸 Chúc mừng ngày Quốc tế Phụ nữ 8/3 🌸",

"Các bạn nam lớp 11A5 xin gửi tới tất cả các bạn nữ lớp 11A5 những lời chúc tốt đẹp nhất.",

"Chúc các bạn luôn xinh đẹp, vui vẻ và luôn tỏa sáng theo cách riêng của mình.",

"Cảm ơn các bạn vì đã mang đến cho lớp 11A5 rất nhiều tiếng cười và những kỷ niệm đáng nhớ.",

"Hy vọng chúng ta sẽ cùng nhau có thêm thật nhiều khoảnh khắc đẹp trong quãng thời gian học tập tại lớp.",

"🌷 Chúc các bạn nữ có một ngày 8/3 thật hạnh phúc và ý nghĩa 🌷",

"— Từ các bạn nam lớp 11A5 —"

];


let index=0;
const box=document.getElementById("wishBox");


function showWish(){

box.style.opacity=0;

setTimeout(()=>{

box.innerHTML=wishes[index];

box.style.opacity=1;

index++;

if(index<wishes.length){

setTimeout(showWish,4000);

}

},1200);

}


/* mở thư */

document.getElementById("startScreen").onclick=function(){

this.style.display="none";

showWish();

}

</script>

</body>
</html>
