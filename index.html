<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>11A5 iu dấu</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:Arial;
background:linear-gradient(135deg,#ff9ecb,#ffd6ec);
overflow:hidden;
color:white;
}

/* tiêu đề */

.title{
font-size:60px;
background:linear-gradient(45deg,#fff,#ff2e7a,#fff);
background-size:200%;
-webkit-background-clip:text;
color:transparent;
animation:shine 3s linear infinite;
}

@keyframes shine{
0%{background-position:0%}
100%{background-position:200%}
}

.container{
z-index:2;
padding:20px;
}

p{
font-size:22px;
max-width:600px;
}

/* nút */

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff2e7a;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

/* popup */

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:#ff2e7a;
padding:30px;
border-radius:20px;
display:none;
box-shadow:0 0 30px rgba(0,0,0,0.2);
z-index:5;
}

/* trái tim và hoa */

.heart,.flower{
position:absolute;
top:-10px;
font-size:24px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(-10vh) rotate(0deg);
opacity:1;
}
100%{
transform:translateY(110vh) rotate(360deg);
opacity:0;
}
}

</style>
</head>

<body>

<div class="container">

<h1 class="title">💖 11A5 iu dấu 💖</h1>

<p>
Chúc các bạn nữ lớp <b>11A5</b> luôn xinh đẹp,
học giỏi, vui vẻ và đạt được mọi ước mơ của mình.  
Cảm ơn vì đã làm cho lớp chúng ta trở nên tuyệt vời hơn mỗi ngày! 🌸
</p>

<button onclick="showWish()">🎁 Nhấn để nhận bất ngờ</button>

</div>

<div class="popup" id="wishBox">
<h2>💐 Happy Women's Day 💐</h2>
<p>Chúc các bạn nữ 11A5 luôn xinh đẹp và hạnh phúc ❤️</p>
</div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4aef7b0c07.mp3" type="audio/mpeg">
</audio>

<script>

/* trái tim */

function createHeart(){
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=3+Math.random()*4+"s";
document.body.appendChild(heart);

setTimeout(()=>{heart.remove()},7000);
}

/* hoa */

function createFlower(){
let flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";
flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=4+Math.random()*5+"s";
document.body.appendChild(flower);

setTimeout(()=>{flower.remove()},7000);
}

setInterval(createHeart,250);
setInterval(createFlower,400);

/* popup */

function showWish(){
document.getElementById("wishBox").style.display="block";
firework();
}

/* pháo hoa */

function firework(){

for(let i=0;i<30;i++){

let spark=document.createElement("div");
spark.innerHTML="✨";
spark.style.position="absolute";
spark.style.left="50%";
spark.style.top="50%";
spark.style.fontSize="25px";

let x=(Math.random()-0.5)*600;
let y=(Math.random()-0.5)*600;

spark.animate([
{transform:"translate(0,0)",opacity:1},
{transform:`translate(${x}px,${y}px)`,opacity:0}
],{
duration:1000
});

document.body.appendChild(spark);

setTimeout(()=>spark.remove(),1000);

}

}

</script>

</body>
</html>
